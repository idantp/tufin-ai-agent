services:
  ollama:
    image: ollama/ollama:latest
    environment:
      - OLLAMA_KEEP_ALIVE=-1        # Never unload the model
    volumes:
      - ollama_data:/root/.ollama
    entrypoint: >
      /bin/sh -c "
        ollama serve &
        echo 'Waiting for Ollama to start...';
        until ollama list > /dev/null 2>&1; do sleep 1; done;
        echo 'Pulling qwen2.5:7b-instruct-q4_K_M...';
        ollama pull qwen2.5:7b-instruct-q4_K_M;
        echo 'Model ready.';
        wait
      "
    healthcheck:
      test: ["CMD-SHELL", "ollama show qwen2.5:7b-instruct-q4_K_M > /dev/null 2>&1"]
      interval: 10s
      timeout: 10s
      retries: 30
      start_period: 300s

  app:
    build: .
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      OLLAMA_BASE_URL: http://ollama:11434
      DATABASE_URL: /data/agent.db
      CHECKPOINT_DB_URL: /data/checkpoints.db
    volumes:
      - ./data:/data
    depends_on:
      ollama:
        condition: service_healthy

volumes:
  ollama_data:
  agent_data:
